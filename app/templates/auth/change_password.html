{% extends "base.html" %}

{% block title %}Zmiana hasła - BugBank{% endblock %}

{% block auth_content %}
<div class="row justify-content-center align-items-center min-vh-100">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow-lg">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="bi bi-key display-4 text-warning"></i>
                    <h3 class="mt-2">Zmiana hasła</h3>
                    <p class="text-muted">Twoje hasło wygasło. Ustaw nowe hasło, aby kontynuować.</p>
                </div>
                
                <form method="POST" action="{{ url_for('auth.change_password') }}">
                    <div class="mb-3">
                        <label for="new_password" class="form-label">Nowe hasło</label>
                        <input 
                            type="password" 
                            class="form-control" 
                            id="new_password" 
                            name="new_password" 
                            placeholder="Minimum 8 znaków"
                            minlength="8"
                            required
                            data-testid="new-password-input">
                    </div>
                    
                    <div class="mb-4">
                        <label for="confirm_password" class="form-label">Potwierdź hasło</label>
                        <input 
                            type="password" 
                            class="form-control" 
                            id="confirm_password" 
                            name="confirm_password" 
                            placeholder="Powtórz nowe hasło"
                            minlength="8"
                            required
                            data-testid="confirm-password-input">
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100" id="{{ generate_random_id('btn_change_password') }}" data-testid="change-password-button">
                        Zmień hasło
                    </button>
                </form>
                
                <hr class="my-4">
                
                <div class="text-center">
                    <a href="{{ url_for('auth.login') }}" class="text-decoration-none">
                        <i class="bi bi-arrow-left me-1"></i>Powrót do logowania
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
