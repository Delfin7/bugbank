{% extends "base.html" %}

{% block title %}Weryfikacja dwuetapowa - BugBank{% endblock %}

{% block auth_content %}
<div class="row justify-content-center align-items-center min-vh-100">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow-lg">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="bi bi-shield-lock display-4 text-primary"></i>
                    <h3 class="mt-2">Weryfikacja dwuetapowa</h3>
                    <p class="text-muted">Wprowadź kod z aplikacji uwierzytelniającej</p>
                </div>
                
                <form method="POST" action="{{ url_for('auth.two_factor') }}">
                    <div class="mb-4">
                        <label for="code" class="form-label">Kod weryfikacyjny</label>
                        <input 
                            type="text" 
                            class="form-control form-control-lg text-center" 
                            id="code" 
                            name="code" 
                            placeholder="000000"
                            maxlength="6"
                            autocomplete="one-time-code"
                            pattern="[0-9]{6}"
                            required
                            data-testid="2fa-code-input">
                        <small class="text-muted">Kod testowy: 123456</small>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100" id="{{ generate_random_id('btn_verify_2fa') }}" data-testid="verify-button">
                        Weryfikuj
                    </button>
                </form>
                
                <hr class="my-4">
                
                <div class="text-center">
                    <a href="{{ url_for('auth.login') }}" class="text-decoration-none">
                        <i class="bi bi-arrow-left me-1"></i>Powrót do logowania
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
