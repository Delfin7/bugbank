<!-- Chat widget button -->
<button id="chat-toggle-btn" class="chat-toggle-btn" title="Pomoc">
    <i class="bi bi-chat-dots-fill"></i>
</button>

<!-- Chat widget container with iframe -->
<div id="chat-widget-container" class="chat-widget-container" style="display: none;">
    <div class="chat-widget-header">
        <span><i class="bi bi-headset me-2"></i>Pomoc online</span>
        <button id="chat-close-btn" class="btn btn-sm btn-link text-white">
            <i class="bi bi-x-lg"></i>
        </button>
    </div>
    <iframe 
        id="chat-iframe"
        src="about:blank"
        class="chat-iframe"
        title="Chat pomocy">
    </iframe>
</div>

<!-- Chat iframe content (loaded dynamically) -->
<template id="chat-iframe-content">
    <!DOCTYPE html>
    <html>
    <head>
        <style>
            * { margin: 0; padding: 0; box-sizing: border-box; }
            body { font-family: Arial, sans-serif; padding: 15px; background: #f8f9fa; }
            .chat-messages { height: 250px; overflow-y: auto; margin-bottom: 15px; }
            .message { padding: 10px; margin: 5px 0; border-radius: 10px; max-width: 80%; }
            .message.bot { background: #e9ecef; margin-right: auto; }
            .message.user { background: #0d6efd; color: white; margin-left: auto; }
            .chat-input-container { display: flex; gap: 10px; }
            .chat-input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
            .chat-send-btn { padding: 10px 20px; background: #0d6efd; color: white; border: none; border-radius: 5px; cursor: pointer; }
            .chat-send-btn:hover { background: #0b5ed7; }
            .typing-indicator { color: #666; font-style: italic; padding: 5px; }
        </style>
    </head>
    <body>
        <div class="chat-messages" id="chat-messages">
            <div class="message bot">
                Witaj! Jestem wirtualnym asystentem BugBank. Jak mogę Ci pomóc?
            </div>
        </div>
        <div id="typing-indicator" class="typing-indicator" style="display: none;">
            Asystent pisze...
        </div>
        <div class="chat-input-container">
            <input type="text" class="chat-input" id="chat-input" placeholder="Napisz wiadomość...">
            <button class="chat-send-btn" id="chat-send-btn">Wyślij</button>
        </div>
        
        <script>
            const messagesContainer = document.getElementById('chat-messages');
            const input = document.getElementById('chat-input');
            const sendBtn = document.getElementById('chat-send-btn');
            const typingIndicator = document.getElementById('typing-indicator');
            
            const botResponses = [
                'Rozumiem. Czy mogę w czymś jeszcze pomóc?',
                'Dziękuję za informację. Sprawdzę to dla Ciebie.',
                'Proszę poczekać, łączę z konsultantem...',
                'Ta funkcja jest dostępna w zakładce "Ustawienia".',
                'Czy możesz podać więcej szczegółów?',
                'Przepraszam, nie rozumiem. Czy możesz to wyjaśnić inaczej?',
                'Świetne pytanie! Odpowiedź znajdziesz w naszym regulaminie.'
            ];
            
            function addMessage(text, isUser) {
                const div = document.createElement('div');
                div.className = 'message ' + (isUser ? 'user' : 'bot');
                div.textContent = text;
                messagesContainer.appendChild(div);
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }
            
            function sendMessage() {
                const text = input.value.trim();
                if (!text) return;
                
                addMessage(text, true);
                input.value = '';
                
                // Show typing indicator
                typingIndicator.style.display = 'block';
                
                // Bot response after delay
                setTimeout(() => {
                    typingIndicator.style.display = 'none';
                    const response = botResponses[Math.floor(Math.random() * botResponses.length)];
                    addMessage(response, false);
                }, 1000 + Math.random() * 2000);
            }
            
            sendBtn.addEventListener('click', sendMessage);
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendMessage();
            });
        </script>
    </body>
    </html>
</template>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const toggleBtn = document.getElementById('chat-toggle-btn');
    const container = document.getElementById('chat-widget-container');
    const closeBtn = document.getElementById('chat-close-btn');
    const iframe = document.getElementById('chat-iframe');
    const template = document.getElementById('chat-iframe-content');
    
    let chatLoaded = false;
    
    toggleBtn.addEventListener('click', function() {
        container.style.display = container.style.display === 'none' ? 'block' : 'none';
        
        // Load iframe content on first open
        if (!chatLoaded && container.style.display === 'block') {
            const content = template.innerHTML;
            iframe.srcdoc = content;
            chatLoaded = true;
        }
    });
    
    closeBtn.addEventListener('click', function() {
        container.style.display = 'none';
    });
});
</script>
